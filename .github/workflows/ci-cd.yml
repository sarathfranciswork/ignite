name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: us-central1
  ARTIFACT_REGISTRY: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/ignite
  IMAGE_TAG: ${{ github.sha }}

# Cancel in-progress PR runs but NEVER cancel main deployments
concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ════════════════════════════════════════════════════════════
  # Stage 1: Code Quality (< 2 min)
  # ════════════════════════════════════════════════════════════
  quality:
    name: "Stage 1: Code Quality"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma validate
        run: npx prisma validate
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx eslint . --max-warnings=0

      - name: Prettier format check
        run: npx prettier --check .

  # ════════════════════════════════════════════════════════════
  # Stage 2: Unit & Integration Tests (< 5 min)
  # ════════════════════════════════════════════════════════════
  test:
    name: "Stage 2: Tests"
    runs-on: ubuntu-latest
    needs: quality

    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: ignite_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Enable pgvector extension
        run: |
          PGPASSWORD=test psql -h localhost -U test -d ignite_test -c "CREATE EXTENSION IF NOT EXISTS vector;"
          PGPASSWORD=test psql -h localhost -U test -d ignite_test -c "CREATE EXTENSION IF NOT EXISTS pg_trgm;"

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ignite_test?schema=public
        run: npx prisma migrate deploy

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/ignite_test?schema=public
          REDIS_URL: redis://localhost:6379
          NEXTAUTH_SECRET: test-secret-for-ci-only
          NEXTAUTH_URL: http://localhost:3000
          NODE_ENV: test
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 7

      - name: Coverage summary on PR
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

  # ════════════════════════════════════════════════════════════
  # Stage 3: Build & Security (< 3 min)
  # ════════════════════════════════════════════════════════════
  build:
    name: "Stage 3: Build & Security"
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Next.js production build
        env:
          DATABASE_URL: "postgresql://placeholder:placeholder@localhost:5432/placeholder"
          NEXTAUTH_SECRET: "build-time-placeholder"
          NEXTAUTH_URL: "http://localhost:3000"
          REDIS_URL: "redis://localhost:6379"
        run: npm run build

      - name: Check bundle size
        run: |
          BUNDLE_SIZE=$(du -sb .next/static | cut -f1)
          BUNDLE_SIZE_MB=$(echo "scale=2; $BUNDLE_SIZE / 1048576" | bc)
          echo "Bundle size: ${BUNDLE_SIZE_MB}MB"

          # Fail if first-load JS exceeds 500KB per route (check via next build output)
          # This is a rough check - Next.js outputs detailed sizes
          if [ "$BUNDLE_SIZE" -gt 52428800 ]; then
            echo "ERROR: Static bundle exceeds 50MB. Investigate bundle size."
            exit 1
          fi

      - name: Security audit
        run: npm audit --audit-level=critical || true
        # Warning only for now - many T3 deps have known low-severity issues

      - name: Docker build
        run: |
          docker build \
            --tag ignite-app:test \
            --target runner \
            .

      - name: Save Docker image
        if: github.ref == 'refs/heads/main'
        run: docker save ignite-app:test | gzip > /tmp/ignite-app.tar.gz

      - name: Upload Docker image artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/ignite-app.tar.gz
          retention-days: 1

  # ════════════════════════════════════════════════════════════
  # Stage 4: E2E Tests (< 10 min)
  # ════════════════════════════════════════════════════════════
  e2e:
    name: "Stage 4: E2E Tests"
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start test infrastructure
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          echo "Waiting for app to become healthy..."
          timeout 180 bash -c '
            until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
              echo "  Waiting... ($(date +%H:%M:%S))"
              # Show container status
              docker compose -f docker-compose.ci.yml ps --format "table {{.Name}}\t{{.Status}}" 2>/dev/null || true
              sleep 5
            done
          ' || {
            echo "=== App failed to start within 180s ==="
            echo "--- Container status ---"
            docker compose -f docker-compose.ci.yml ps
            echo "--- App container logs ---"
            docker compose -f docker-compose.ci.yml logs app --tail 100
            echo "--- Postgres logs ---"
            docker compose -f docker-compose.ci.yml logs postgres --tail 30
            exit 1
          }
          echo "App is healthy!"
          curl -sf http://localhost:3000/api/health | jq .

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload test traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  # ════════════════════════════════════════════════════════════
  # Stage 5: Visual Regression Tests (< 5 min)
  # ════════════════════════════════════════════════════════════
  visual:
    name: "Stage 5: Visual Regression"
    runs-on: ubuntu-latest
    needs: [test, build]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start test infrastructure
        run: |
          docker compose -f docker-compose.ci.yml up -d --build
          echo "Waiting for app to become healthy..."
          timeout 180 bash -c '
            until curl -sf http://localhost:3000/api/health > /dev/null 2>&1; do
              sleep 5
            done
          ' || {
            echo "=== App failed to start ==="
            docker compose -f docker-compose.ci.yml logs app --tail 100
            exit 1
          }
          echo "App is healthy!"

      - name: Run visual regression tests
        run: npx playwright test --project=visual-desktop --project=visual-mobile
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
        continue-on-error: true # Advisory until baselines stabilize

      - name: Upload visual diff artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-regression-results
          path: |
            test-results/
            playwright-report/
          retention-days: 14

      - name: Stop test infrastructure
        if: always()
        run: docker compose -f docker-compose.ci.yml down -v

  # ════════════════════════════════════════════════════════════
  # Stage 6: Deploy to Production (main branch only)
  # ════════════════════════════════════════════════════════════
  deploy:
    name: "Stage 6: Deploy to Production"
    runs-on: ubuntu-latest
    needs: [e2e, visual]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    outputs:
      url: ${{ steps.deploy.outputs.url }}

    permissions:
      contents: read
      id-token: write

    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${GCP_REGION}-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            --tag ${ARTIFACT_REGISTRY}/app:${IMAGE_TAG} \
            --tag ${ARTIFACT_REGISTRY}/app:latest \
            --target runner \
            .
          docker push ${ARTIFACT_REGISTRY}/app:${IMAGE_TAG}
          docker push ${ARTIFACT_REGISTRY}/app:latest

      - name: Deploy to Cloud Run
        id: deploy
        run: |
          gcloud run deploy ignite-app \
            --image ${ARTIFACT_REGISTRY}/app:${IMAGE_TAG} \
            --region ${GCP_REGION} \
            --platform managed \
            --quiet

          URL=$(gcloud run services describe ignite-app --region ${GCP_REGION} --format 'value(status.url)')
          echo "url=$URL" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $URL"

      - name: Wait for health check
        id: health
        run: |
          URL="${{ steps.deploy.outputs.url }}"
          echo "Checking health at ${URL}/api/health..."

          for i in $(seq 1 30); do
            STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${URL}/api/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i/30: status=$STATUS, retrying in 5s..."
            sleep 5
          done

          echo "Health check failed after 30 attempts"
          exit 1

      - name: Rollback on health check failure
        if: failure() && steps.health.outcome == 'failure'
        run: |
          echo "Rolling back to previous revision..."
          PREV_REVISION=$(gcloud run revisions list \
            --service ignite-app \
            --region ${GCP_REGION} \
            --sort-by ~creationTimestamp \
            --limit 2 \
            --format 'value(metadata.name)' | tail -1)

          if [ -n "$PREV_REVISION" ]; then
            gcloud run services update-traffic ignite-app \
              --region ${GCP_REGION} \
              --to-revisions ${PREV_REVISION}=100
            echo "Rolled back to: $PREV_REVISION"
          else
            echo "No previous revision to rollback to"
          fi

  # ════════════════════════════════════════════════════════════
  # Stage 7: Post-Deployment Validation (main branch only)
  # ════════════════════════════════════════════════════════════
  post-deploy:
    name: "Stage 7: Post-Deploy Validation"
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Get production URL
        id: url
        run: |
          # Get URL from deploy job output via Cloud Run
          URL=$(gcloud run services describe ignite-app --region ${GCP_REGION} --format 'value(status.url)' 2>/dev/null || echo "")
          if [ -z "$URL" ]; then
            URL="${{ needs.deploy.outputs.url }}"
          fi
          echo "url=$URL" >> "$GITHUB_OUTPUT"
      - name: Smoke tests
        run: |
          URL="${{ needs.deploy.outputs.url }}"
          echo "Running smoke tests against $URL"

          # Health endpoint
          echo "Checking /api/health..."
          curl -sf "$URL/api/health" | jq .

          # Login page loads
          echo "Checking login page..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/login")
          [ "$STATUS" = "200" ] || { echo "Login page failed: $STATUS"; exit 1; }

          # Static assets load
          echo "Checking static assets..."
          STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "$URL/_next/static/" 2>/dev/null || echo "200")

          echo "All smoke tests passed!"

      - name: Run visual tests against production
        run: npx playwright test --project=visual-desktop --project=visual-mobile
        env:
          PLAYWRIGHT_BASE_URL: ${{ needs.deploy.outputs.url }}
        continue-on-error: true # Don't auto-rollback, just alert

      - name: Post results to commit
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? 'passed' : 'has issues';
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `## Post-Deployment Validation ${status === 'passed' ? '✅' : '⚠️'}\n\nProduction URL: ${{ needs.deploy.outputs.url }}\nStatus: ${status}\n\nSee [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.`
            });
