name: Orchestration Watchdog

# Self-healing watchdog that monitors the DAG-based parallel story pipeline.
# Checks per-epic progress, PR health, CI/CD, and production.
# Automatically recovers from stuck lanes, failed runs, and merge conflicts.

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch: # Manual trigger

concurrency:
  group: orchestration-watchdog
  cancel-in-progress: false

permissions:
  issues: write
  contents: read
  pull-requests: write
  actions: read

env:
  PRODUCTION_URL: https://ignite-app-756107880925.us-central1.run.app
  MAX_RETRIES: 3
  CLAUDE_RUN_TIMEOUT_MINUTES: 45
  PR_AUTO_MERGE_HOURS: 2
  PR_CI_FIX_MINUTES: 30
  PR_ALERT_HOURS: 4

jobs:
  watchdog:
    name: Orchestration Watchdog
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ══════════════════════════════════════════════════════════
      # 1. DAG Health — Per-Epic Progress Tracking
      # ══════════════════════════════════════════════════════════
      - name: "Check DAG health"
        id: dag_health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          DAG_FILE=".github/story-dag.json"

          if [ ! -f "$DAG_FILE" ]; then
            echo "dag_status=error" >> "$GITHUB_OUTPUT"
            echo "dag_message=story-dag.json not found" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          MAX_PARALLEL=$(jq -r '.config.max_parallel' "$DAG_FILE")

          # Batch fetch all issue states in one API call
          ALL_ISSUES=$(gh issue list --state all --limit 200 --json number,state,labels 2>/dev/null || echo "[]")

          TOTAL_STORIES=$(jq '.stories | length' "$DAG_FILE")
          CLOSED_COUNT=0
          ACTIVE_STORIES=""
          ACTIVE_COUNT=0
          COMPLETE_EPICS=""
          EPIC_STATUS_LINES=""

          # Build per-epic status
          for EPIC_ID in $(jq -r '.epics | keys[]' "$DAG_FILE"); do
            EPIC_NAME=$(jq -r --arg ep "$EPIC_ID" '.epics[$ep].name' "$DAG_FILE")
            EPIC_STORY_ISSUES=$(jq -r --arg ep "$EPIC_ID" '.epics[$ep].stories[]' "$DAG_FILE")
            EPIC_TOTAL=$(jq --arg ep "$EPIC_ID" '.epics[$ep].stories | length' "$DAG_FILE")
            EPIC_CLOSED=0
            EPIC_ACTIVE=""

            for S_ISSUE in $EPIC_STORY_ISSUES; do
              STATE=$(echo "$ALL_ISSUES" | jq -r --argjson num "$S_ISSUE" '[.[] | select(.number == $num)][0].state // "OPEN"')
              HAS_LABEL=$(echo "$ALL_ISSUES" | jq -r --argjson num "$S_ISSUE" '[.[] | select(.number == $num)][0].labels // [] | map(.name) | any(. == "claude-code")')

              if [ "$STATE" = "CLOSED" ]; then
                EPIC_CLOSED=$((EPIC_CLOSED + 1))
                CLOSED_COUNT=$((CLOSED_COUNT + 1))
              elif [ "$HAS_LABEL" = "true" ]; then
                S_ID=$(jq -r --argjson num "$S_ISSUE" '.stories[($num | tostring)].id' "$DAG_FILE")
                EPIC_ACTIVE="$S_ID (#$S_ISSUE)"
                ACTIVE_STORIES="$ACTIVE_STORIES $S_ISSUE"
                ACTIVE_COUNT=$((ACTIVE_COUNT + 1))
              fi
            done

            if [ "$EPIC_CLOSED" -eq "$EPIC_TOTAL" ]; then
              COMPLETE_EPICS="$COMPLETE_EPICS $EPIC_ID"
              EPIC_STATUS_LINES="${EPIC_STATUS_LINES}| Epic $EPIC_ID | $EPIC_NAME | COMPLETE ($EPIC_CLOSED/$EPIC_TOTAL) |\n"
            elif [ -n "$EPIC_ACTIVE" ]; then
              EPIC_STATUS_LINES="${EPIC_STATUS_LINES}| Epic $EPIC_ID | $EPIC_NAME | Active: $EPIC_ACTIVE ($EPIC_CLOSED/$EPIC_TOTAL) |\n"
            elif [ "$EPIC_CLOSED" -gt 0 ]; then
              EPIC_STATUS_LINES="${EPIC_STATUS_LINES}| Epic $EPIC_ID | $EPIC_NAME | Paused ($EPIC_CLOSED/$EPIC_TOTAL) |\n"
            else
              EPIC_STATUS_LINES="${EPIC_STATUS_LINES}| Epic $EPIC_ID | $EPIC_NAME | Waiting ($EPIC_CLOSED/$EPIC_TOTAL) |\n"
            fi
          done

          echo "closed_count=$CLOSED_COUNT" >> "$GITHUB_OUTPUT"
          echo "total_stories=$TOTAL_STORIES" >> "$GITHUB_OUTPUT"
          echo "active_count=$ACTIVE_COUNT" >> "$GITHUB_OUTPUT"
          echo "active_stories=$ACTIVE_STORIES" >> "$GITHUB_OUTPUT"
          echo "max_parallel=$MAX_PARALLEL" >> "$GITHUB_OUTPUT"

          echo "epic_status<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$EPIC_STATUS_LINES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

          echo "complete_epics=$COMPLETE_EPICS" >> "$GITHUB_OUTPUT"

          if [ "$CLOSED_COUNT" -eq "$TOTAL_STORIES" ]; then
            echo "dag_status=complete" >> "$GITHUB_OUTPUT"
            echo "dag_message=All $TOTAL_STORIES stories complete!" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$ACTIVE_COUNT" -gt 0 ]; then
            echo "dag_status=active" >> "$GITHUB_OUTPUT"
            echo "dag_message=$ACTIVE_COUNT active stories, $CLOSED_COUNT/$TOTAL_STORIES complete" >> "$GITHUB_OUTPUT"
          else
            echo "dag_status=idle" >> "$GITHUB_OUTPUT"
            echo "dag_message=No active stories. $CLOSED_COUNT/$TOTAL_STORIES complete. Checking for stuck lanes..." >> "$GITHUB_OUTPUT"
          fi

      # ══════════════════════════════════════════════════════════
      # 2. Self-Healing: Trigger Ready Epics if DAG is Idle
      # ══════════════════════════════════════════════════════════
      - name: "Self-heal: Trigger ready epics"
        id: trigger_ready
        if: steps.dag_health.outputs.dag_status == 'idle'
        env:
          # CRITICAL: Must use PAT to trigger Claude workflow via labels.
          # GITHUB_TOKEN cannot trigger new workflow runs (GitHub anti-recursion).
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          DAG_FILE=".github/story-dag.json"
          MAX_PARALLEL="${{ steps.dag_health.outputs.max_parallel }}"
          COMPLETE_EPICS="${{ steps.dag_health.outputs.complete_epics }}"

          ALL_ISSUES=$(gh issue list --state all --limit 200 --json number,state,labels 2>/dev/null || echo "[]")

          TRIGGERED_COUNT=0
          TRIGGERED_LIST=""

          for EPIC_ID in $(jq -r '.epics | keys[]' "$DAG_FILE"); do
            if [ "$TRIGGERED_COUNT" -ge "$MAX_PARALLEL" ]; then
              break
            fi

            # Skip complete epics
            if echo "$COMPLETE_EPICS" | grep -qw "$EPIC_ID"; then
              continue
            fi

            # Check if epic already has active or closed stories
            EPIC_STARTED=false
            FIRST_OPEN_STORY=""
            for S_ISSUE in $(jq -r --arg ep "$EPIC_ID" '.epics[$ep].stories[]' "$DAG_FILE"); do
              STATE=$(echo "$ALL_ISSUES" | jq -r --argjson num "$S_ISSUE" '[.[] | select(.number == $num)][0].state // "OPEN"')
              HAS_LABEL=$(echo "$ALL_ISSUES" | jq -r --argjson num "$S_ISSUE" '[.[] | select(.number == $num)][0].labels // [] | map(.name) | any(. == "claude-code")')

              if [ "$STATE" = "CLOSED" ] || [ "$HAS_LABEL" = "true" ]; then
                EPIC_STARTED=true
                break
              fi
              if [ -z "$FIRST_OPEN_STORY" ] && [ "$STATE" = "OPEN" ]; then
                FIRST_OPEN_STORY="$S_ISSUE"
              fi
            done

            # If epic already started but has no active label, it's a stuck epic
            # Find the next open story in this epic
            if [ "$EPIC_STARTED" = true ]; then
              # Find next unfinished story in this epic
              NEXT_STORY=""
              for S_ISSUE in $(jq -r --arg ep "$EPIC_ID" '.epics[$ep].stories[]' "$DAG_FILE"); do
                STATE=$(echo "$ALL_ISSUES" | jq -r --argjson num "$S_ISSUE" '[.[] | select(.number == $num)][0].state // "OPEN"')
                HAS_LABEL=$(echo "$ALL_ISSUES" | jq -r --argjson num "$S_ISSUE" '[.[] | select(.number == $num)][0].labels // [] | map(.name) | any(. == "claude-code")')
                if [ "$STATE" = "OPEN" ] && [ "$HAS_LABEL" != "true" ]; then
                  # Verify its predecessor in the epic is closed
                  EPIC_STORIES_JSON=$(jq --arg ep "$EPIC_ID" '.epics[$ep].stories' "$DAG_FILE")
                  S_INDEX=$(echo "$EPIC_STORIES_JSON" | jq --argjson num "$S_ISSUE" 'to_entries[] | select(.value == $num) | .key')
                  if [ "$S_INDEX" -eq 0 ]; then
                    NEXT_STORY="$S_ISSUE"
                    break
                  else
                    PREV_INDEX=$((S_INDEX - 1))
                    PREV_ISSUE=$(echo "$EPIC_STORIES_JSON" | jq ".[$PREV_INDEX]")
                    PREV_STATE=$(echo "$ALL_ISSUES" | jq -r --argjson num "$PREV_ISSUE" '[.[] | select(.number == $num)][0].state // "OPEN"')
                    if [ "$PREV_STATE" = "CLOSED" ]; then
                      NEXT_STORY="$S_ISSUE"
                      break
                    fi
                  fi
                fi
              done

              if [ -n "$NEXT_STORY" ]; then
                S_ID=$(jq -r --argjson num "$NEXT_STORY" '.stories[($num | tostring)].id' "$DAG_FILE")
                EPIC_NAME=$(jq -r --arg ep "$EPIC_ID" '.epics[$ep].name' "$DAG_FILE")
                echo "Unsticking Epic $EPIC_ID: triggering Story $S_ID (#$NEXT_STORY)"

                gh issue edit "$NEXT_STORY" --add-label "claude-code" 2>/dev/null || true
                gh workflow run claude.yml --ref main -f issue_number="$NEXT_STORY" 2>/dev/null || true
                gh issue comment "$NEXT_STORY" --body "## Orchestration: DAG Lane Recovery

          Epic $EPIC_ID ($EPIC_NAME) lane was stuck. Triggering Story $S_ID automatically.

          **Trigger:** Orchestration Watchdog (self-healing)" || true

                TRIGGERED_COUNT=$((TRIGGERED_COUNT + 1))
                TRIGGERED_LIST="$TRIGGERED_LIST #$NEXT_STORY"
              fi
              continue
            fi

            # Epic not started — check if all dependencies are met
            DEPS_MET=true
            for DEP_ID in $(jq -r --arg ep "$EPIC_ID" '.epics[$ep].depends_on[]' "$DAG_FILE"); do
              if ! echo "$COMPLETE_EPICS" | grep -qw "$DEP_ID"; then
                DEPS_MET=false
                break
              fi
            done

            if [ "$DEPS_MET" = true ] && [ -n "$FIRST_OPEN_STORY" ]; then
              S_ID=$(jq -r --argjson num "$FIRST_OPEN_STORY" '.stories[($num | tostring)].id' "$DAG_FILE")
              EPIC_NAME=$(jq -r --arg ep "$EPIC_ID" '.epics[$ep].name' "$DAG_FILE")
              echo "Starting ready Epic $EPIC_ID ($EPIC_NAME): Story $S_ID (#$FIRST_OPEN_STORY)"

              gh issue edit "$FIRST_OPEN_STORY" --add-label "claude-code" 2>/dev/null || true
              gh workflow run claude.yml --ref main -f issue_number="$FIRST_OPEN_STORY" 2>/dev/null || true
              gh issue comment "$FIRST_OPEN_STORY" --body "## Orchestration: New Epic Unlocked

          All dependencies for **Epic $EPIC_ID ($EPIC_NAME)** are met. Starting first story.

          **Trigger:** Orchestration Watchdog (self-healing)" || true

              TRIGGERED_COUNT=$((TRIGGERED_COUNT + 1))
              TRIGGERED_LIST="$TRIGGERED_LIST #$FIRST_OPEN_STORY"
            fi
          done

          echo "triggered_count=$TRIGGERED_COUNT" >> "$GITHUB_OUTPUT"
          echo "triggered_list=$TRIGGERED_LIST" >> "$GITHUB_OUTPUT"

      # ══════════════════════════════════════════════════════════
      # 3. Check Active Claude Runs for Timeouts/Failures
      # ══════════════════════════════════════════════════════════
      - name: "Check Claude workflow runs"
        id: claude_runs
        if: steps.dag_health.outputs.active_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ACTIVE_STORIES="${{ steps.dag_health.outputs.active_stories }}"

          # Check for in-progress Claude Code workflow runs
          RUNS=$(gh run list --workflow=claude.yml --status=in_progress --json databaseId,createdAt,status --limit 10 2>/dev/null || echo "[]")
          RUN_COUNT=$(echo "$RUNS" | jq 'length')

          TIMEOUT_RUNS=""
          NOW_EPOCH=$(date +%s)

          if [ "$RUN_COUNT" -gt 0 ]; then
            echo "claude_running=true" >> "$GITHUB_OUTPUT"

            for i in $(seq 0 $((RUN_COUNT - 1))); do
              RUN_CREATED=$(echo "$RUNS" | jq -r ".[$i].createdAt")
              RUN_ID=$(echo "$RUNS" | jq -r ".[$i].databaseId")
              RUN_EPOCH=$(date -d "$RUN_CREATED" +%s 2>/dev/null || echo "0")
              ELAPSED=$(( (NOW_EPOCH - RUN_EPOCH) / 60 ))

              if [ "$ELAPSED" -gt "${{ env.CLAUDE_RUN_TIMEOUT_MINUTES }}" ]; then
                TIMEOUT_RUNS="$TIMEOUT_RUNS $RUN_ID"
              fi
            done

            if [ -n "$TIMEOUT_RUNS" ]; then
              echo "has_timeouts=true" >> "$GITHUB_OUTPUT"
              echo "timeout_runs=$TIMEOUT_RUNS" >> "$GITHUB_OUTPUT"
            else
              echo "has_timeouts=false" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "claude_running=false" >> "$GITHUB_OUTPUT"
            echo "has_timeouts=false" >> "$GITHUB_OUTPUT"

            # Check for recently failed runs
            RECENT=$(gh run list --workflow=claude.yml --json databaseId,conclusion,status --limit 10 2>/dev/null || echo "[]")
            FAILED=$(echo "$RECENT" | jq -r '[.[] | select(.status != "in_progress" and .conclusion == "failure")][0].databaseId // empty')

            if [ -n "$FAILED" ]; then
              echo "has_failures=true" >> "$GITHUB_OUTPUT"
              echo "failed_run=$FAILED" >> "$GITHUB_OUTPUT"
            else
              echo "has_failures=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: "Self-heal: Retry failed stories"
        if: steps.claude_runs.outputs.has_failures == 'true' && steps.dag_health.outputs.active_stories != ''
        env:
          # Must use PAT for label operations that trigger Claude workflow
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ACTIVE_STORIES="${{ steps.dag_health.outputs.active_stories }}"

          for ISSUE_NUM in $ACTIVE_STORIES; do
            RETRY_COUNT=$(gh issue view "$ISSUE_NUM" --json comments --jq '[.comments[] | select(.body | contains("Orchestration: Retry"))] | length' 2>/dev/null || echo "0")

            if [ "$RETRY_COUNT" -ge "${{ env.MAX_RETRIES }}" ]; then
              echo "Max retries reached for #$ISSUE_NUM. Creating alert."
              EXISTING=$(gh issue list --label "orchestration-alert" --state open --search "#$ISSUE_NUM stuck" --json number --jq 'length' 2>/dev/null || echo "0")
              if [ "$EXISTING" -eq 0 ]; then
                STORY_ID=$(jq -r --argjson num "$ISSUE_NUM" '.stories[($num | tostring)].id' ".github/story-dag.json")
                gh issue create \
                  --title "Orchestration Alert: Story $STORY_ID (#$ISSUE_NUM) stuck after ${{ env.MAX_RETRIES }} retries" \
                  --label "orchestration-alert,bug" \
                  --body "## Max Retries Exceeded

          **Story:** $STORY_ID (#$ISSUE_NUM)
          **Retries exhausted:** ${{ env.MAX_RETRIES }}

          Manual intervention required. Check workflow runs for error details." || true
              fi
              continue
            fi

            ATTEMPT=$((RETRY_COUNT + 1))
            echo "Retrying story #$ISSUE_NUM (attempt $ATTEMPT/${{ env.MAX_RETRIES }})"

            gh issue edit "$ISSUE_NUM" --add-label "claude-code" 2>/dev/null || true
            gh workflow run claude.yml --ref main -f issue_number="$ISSUE_NUM" 2>/dev/null || true
            gh issue comment "$ISSUE_NUM" --body "## Orchestration: Retry (Attempt $ATTEMPT/${{ env.MAX_RETRIES }})

          Previous Claude run failed. Retrying automatically.

          **Failed Run:** ${{ steps.claude_runs.outputs.failed_run }}" || true
          done

      # ══════════════════════════════════════════════════════════
      # 4. PR Health & Conflict Detection
      # ══════════════════════════════════════════════════════════
      - name: "Check PR health"
        id: pr_health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          NOW_EPOCH=$(date +%s)

          OPEN_PRS=$(gh pr list --state open --json number,createdAt,headRefName,title,statusCheckRollup,mergeable --limit 20 2>/dev/null || echo "[]")

          PR_ISSUES=""
          PR_ACTIONS=""
          PR_COUNT=$(echo "$OPEN_PRS" | jq '[.[] | select(.headRefName | startswith("claude/"))] | length')

          echo "open_pr_count=$PR_COUNT" >> "$GITHUB_OUTPUT"

          echo "$OPEN_PRS" | jq -c '.[] | select(.headRefName | startswith("claude/"))' | while read -r PR; do
            PR_NUM=$(echo "$PR" | jq -r '.number')
            PR_CREATED=$(echo "$PR" | jq -r '.createdAt')
            PR_TITLE=$(echo "$PR" | jq -r '.title')
            PR_BRANCH=$(echo "$PR" | jq -r '.headRefName')
            MERGEABLE=$(echo "$PR" | jq -r '.mergeable')

            # GitHub may return UNKNOWN for recently-changed PRs. Retry once.
            if [ "$MERGEABLE" = "UNKNOWN" ]; then
              sleep 5
              MERGEABLE=$(gh pr view "$PR_NUM" --json mergeable --jq '.mergeable' 2>/dev/null || echo "UNKNOWN")
              echo "PR #$PR_NUM mergeable re-checked: $MERGEABLE"
            fi

            PR_CREATED_EPOCH=$(date -d "$PR_CREATED" +%s 2>/dev/null || echo "0")
            ELAPSED_HOURS=$(( (NOW_EPOCH - PR_CREATED_EPOCH) / 3600 ))
            ELAPSED_MINUTES=$(( (NOW_EPOCH - PR_CREATED_EPOCH) / 60 ))

            PR_CHECKS=$(gh pr checks "$PR_NUM" 2>/dev/null || echo "")
            ALL_PASS=$(echo "$PR_CHECKS" | grep -c "pass" || echo "0")
            ANY_FAIL=$(echo "$PR_CHECKS" | grep -c "fail" || echo "0")

            # Handle merge conflicts (CONFLICTING or still UNKNOWN after retry)
            if [ "$MERGEABLE" = "CONFLICTING" ] || [ "$MERGEABLE" = "UNKNOWN" ]; then
              EXISTING_FIX=$(gh pr view "$PR_NUM" --json comments --jq '[.comments[] | select(.body | contains("please rebase"))] | length' 2>/dev/null || echo "0")
              if [ "$EXISTING_FIX" -eq 0 ]; then
                echo "PR #$PR_NUM has merge conflicts. Requesting rebase."
                gh pr comment "$PR_NUM" --body "@claude This PR has merge conflicts with main. Please rebase on latest main and resolve conflicts:
          1. \`git fetch origin main && git rebase origin/main\`
          2. For package-lock.json: \`git checkout --theirs package-lock.json && npm install\`
          3. For prisma/schema.prisma: Keep ALL models from both sides, then \`npx prisma validate\`
          4. For other files: Keep functionality from both sides
          5. \`git push --force-with-lease\`" || true
              fi
            fi

            # Auto-merge passing PRs that have been open too long
            if [ "$ELAPSED_HOURS" -ge "${{ env.PR_AUTO_MERGE_HOURS }}" ] && [ "$ANY_FAIL" -eq 0 ] && [ "$ALL_PASS" -gt 0 ]; then
              echo "Auto-merging PR #$PR_NUM (open ${ELAPSED_HOURS}h, CI passing)"
              gh pr merge "$PR_NUM" --auto --squash || true
            fi

            # Request CI fix for failing PRs
            if [ "$ANY_FAIL" -gt 0 ] && [ "$ELAPSED_MINUTES" -ge "${{ env.PR_CI_FIX_MINUTES }}" ]; then
              EXISTING_FIX=$(gh pr view "$PR_NUM" --json comments --jq '[.comments[] | select(.body | contains("please fix the CI"))] | length' 2>/dev/null || echo "0")
              if [ "$EXISTING_FIX" -eq 0 ]; then
                gh pr review "$PR_NUM" --comment --body "@claude please fix the CI failures" || true
              fi
            fi

            # Alert for very old PRs
            if [ "$ELAPSED_HOURS" -ge "${{ env.PR_ALERT_HOURS }}" ]; then
              EXISTING_ALERT=$(gh issue list --label "orchestration-alert" --state open --search "PR #$PR_NUM" --json number --jq 'length' 2>/dev/null || echo "0")
              if [ "$EXISTING_ALERT" -eq 0 ]; then
                gh issue create \
                  --title "Orchestration Alert: PR #$PR_NUM open > ${ELAPSED_HOURS}h" \
                  --label "orchestration-alert" \
                  --body "## Stale PR Alert

          **PR:** #$PR_NUM - $PR_TITLE
          **Branch:** \`$PR_BRANCH\`
          **Open for:** ${ELAPSED_HOURS} hours
          **Mergeable:** $MERGEABLE
          **CI:** $([ "$ANY_FAIL" -gt 0 ] && echo 'FAILING' || echo 'PASSING/PENDING')

          Review and take action to unblock the pipeline." || true
              fi
            fi
          done

      # ══════════════════════════════════════════════════════════
      # 5. CI/CD Pipeline Health
      # ══════════════════════════════════════════════════════════
      - name: "Check CI/CD pipeline health"
        id: cicd_health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          LAST_RUN=$(gh run list --workflow=ci-cd.yml --branch=main --limit 1 --json databaseId,conclusion,status,createdAt,headSha 2>/dev/null || echo "[]")
          RUN_COUNT=$(echo "$LAST_RUN" | jq 'length')

          if [ "$RUN_COUNT" -eq 0 ]; then
            echo "cicd_status=none" >> "$GITHUB_OUTPUT"
            echo "cicd_message=No CI/CD runs found on main" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          CONCLUSION=$(echo "$LAST_RUN" | jq -r '.[0].conclusion // "in_progress"')
          STATUS=$(echo "$LAST_RUN" | jq -r '.[0].status')
          RUN_ID=$(echo "$LAST_RUN" | jq -r '.[0].databaseId')
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/$RUN_ID"

          echo "cicd_run_url=$RUN_URL" >> "$GITHUB_OUTPUT"

          if [ "$CONCLUSION" = "success" ]; then
            echo "cicd_status=healthy" >> "$GITHUB_OUTPUT"
            echo "cicd_message=Last CI/CD run succeeded" >> "$GITHUB_OUTPUT"
          elif [ "$STATUS" = "in_progress" ]; then
            echo "cicd_status=running" >> "$GITHUB_OUTPUT"
            echo "cicd_message=CI/CD run in progress" >> "$GITHUB_OUTPUT"
          else
            echo "cicd_status=failed" >> "$GITHUB_OUTPUT"
            FAILED_JOBS=$(gh run view "$RUN_ID" --json jobs --jq '[.jobs[] | select(.conclusion == "failure")] | map(.name) | join(", ")' 2>/dev/null || echo "unknown")
            echo "cicd_message=FAILED: $FAILED_JOBS" >> "$GITHUB_OUTPUT"

            EXISTING=$(gh issue list --label "orchestration-alert" --state open --search "CI/CD pipeline failed" --json number --jq 'length' 2>/dev/null || echo "0")
            if [ "$EXISTING" -eq 0 ]; then
              gh issue create \
                --title "Orchestration Alert: CI/CD pipeline failed on main" \
                --label "orchestration-alert,bug" \
                --body "## CI/CD Pipeline Failure

          **Run:** [$RUN_ID]($RUN_URL)
          **Failed Stages:** $FAILED_JOBS

          Fix required to unblock deployments." || true
            fi
          fi

      # ══════════════════════════════════════════════════════════
      # 6. Production Health
      # ══════════════════════════════════════════════════════════
      - name: "Check production health"
        id: prod_health
        run: |
          set +e
          PROD_URL="${{ env.PRODUCTION_URL }}"
          HEALTH_STATUS=$(curl -sf -o /dev/null -w "%{http_code}" "${PROD_URL}/api/health" 2>/dev/null || echo "000")

          if [ "$HEALTH_STATUS" = "200" ]; then
            echo "prod_status=healthy" >> "$GITHUB_OUTPUT"
          else
            echo "prod_status=unhealthy" >> "$GITHUB_OUTPUT"
            echo "prod_http=$HEALTH_STATUS" >> "$GITHUB_OUTPUT"
          fi

      - name: "Create alert for production issues"
        if: steps.prod_health.outputs.prod_status == 'unhealthy'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          EXISTING=$(gh issue list --label "orchestration-alert,production" --state open --json number --jq 'length' 2>/dev/null || echo "0")
          if [ "$EXISTING" -eq 0 ]; then
            gh issue create \
              --title "Orchestration Alert: Production health check failing" \
              --label "orchestration-alert,production,bug" \
              --body "## Production Health Degraded

          **URL:** ${{ env.PRODUCTION_URL }}
          **HTTP Status:** ${{ steps.prod_health.outputs.prod_http }}

          Check Cloud Run console and recent deployments." || true
          fi

      # ══════════════════════════════════════════════════════════
      # 7. Status Dashboard
      # ══════════════════════════════════════════════════════════
      - name: "Find or create status issue"
        id: status_issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          STATUS_ISSUE=$(gh issue list --label "orchestration-status" --state open --json number --jq '.[0].number // empty' 2>/dev/null || echo "")

          if [ -z "$STATUS_ISSUE" ]; then
            STATUS_ISSUE=$(gh issue create \
              --title "Orchestration Status Dashboard" \
              --label "orchestration-status" \
              --body "Auto-updated by the Orchestration Watchdog. Do not close." \
              --json number --jq '.number' 2>/dev/null || echo "")

            if [ -n "$STATUS_ISSUE" ]; then
              gh api graphql -f query='
                mutation {
                  pinIssue(input: {issueId: "'"$(gh issue view "$STATUS_ISSUE" --json id --jq '.id')"'"}) {
                    issue { number }
                  }
                }
              ' 2>/dev/null || true
            fi
          fi

          echo "issue_number=$STATUS_ISSUE" >> "$GITHUB_OUTPUT"

      - name: "Update status dashboard"
        if: steps.status_issue.outputs.issue_number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          STATUS_ISSUE="${{ steps.status_issue.outputs.issue_number }}"
          NOW=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          CLOSED="${{ steps.dag_health.outputs.closed_count }}"
          TOTAL="${{ steps.dag_health.outputs.total_stories }}"
          ACTIVE="${{ steps.dag_health.outputs.active_count }}"
          MAX_P="${{ steps.dag_health.outputs.max_parallel }}"
          DAG_STATUS="${{ steps.dag_health.outputs.dag_status }}"
          CICD_STATUS="${{ steps.cicd_health.outputs.cicd_status }}"
          PROD_STATUS="${{ steps.prod_health.outputs.prod_status }}"

          # Progress bar
          if [ -n "$CLOSED" ] && [ -n "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
            PCT=$((CLOSED * 100 / TOTAL))
            FILLED=$((PCT / 5))
            EMPTY=$((20 - FILLED))
            BAR=$(printf '%0.s=' $(seq 1 $FILLED 2>/dev/null || echo ""))$(printf '%0.s-' $(seq 1 $EMPTY 2>/dev/null || echo ""))
          else
            PCT=0
            BAR="--------------------"
            CLOSED="0"
            TOTAL="?"
          fi

          # Overall health
          if [ "$DAG_STATUS" = "complete" ]; then
            OVERALL="COMPLETE"
          elif [ "$CICD_STATUS" = "failed" ] || [ "$PROD_STATUS" = "unhealthy" ]; then
            OVERALL="NEEDS ATTENTION"
          elif [ "$DAG_STATUS" = "idle" ] && [ "$CLOSED" != "$TOTAL" ]; then
            OVERALL="NEEDS ATTENTION"
          else
            OVERALL="HEALTHY"
          fi

          # Self-healing summary
          HEALED=""
          if [ "${{ steps.trigger_ready.outputs.triggered_count }}" -gt "0" ] 2>/dev/null; then
            HEALED="Triggered stories: ${{ steps.trigger_ready.outputs.triggered_list }}"
          fi

          REPORT=$(cat <<ENDOFBODY
          ## Orchestration Status Dashboard

          **Last Updated:** ${NOW}
          **Overall:** ${OVERALL}
          **Execution Mode:** DAG Parallel (max ${MAX_P} concurrent)

          ---

          ### Progress
          \`\`\`
          [${BAR}] ${CLOSED}/${TOTAL} stories (${PCT}%)
          \`\`\`
          **Active lanes:** ${ACTIVE} / ${MAX_P}

          ### Epic Status
          | Epic | Name | Status |
          |------|------|--------|
          ${{ steps.dag_health.outputs.epic_status }}

          ### Infrastructure
          | System | Status |
          |--------|--------|
          | CI/CD | ${CICD_STATUS} |
          | Production | ${PROD_STATUS} |
          | Open Claude PRs | ${{ steps.pr_health.outputs.open_pr_count }} |

          ### Self-Healing
          $(if [ -n "$HEALED" ]; then echo "$HEALED"; else echo "None this cycle"; fi)

          ---
          *[Orchestration Watchdog](/${{ github.repository }}/actions/workflows/orchestration-watchdog.yml) | Run [${{ github.run_id }}](/${{ github.repository }}/actions/runs/${{ github.run_id }})*
          ENDOFBODY
          )

          gh issue edit "$STATUS_ISSUE" --body "$REPORT" || true
