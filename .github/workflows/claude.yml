name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process"
        required: true
        type: string

# Per-issue concurrency: allows parallel work on different issues
# but prevents duplicate runs for the same issue
concurrency:
  group: claude-code-${{ github.event.issue.number || github.event.pull_request.number || github.event.inputs.issue_number || 'default' }}
  cancel-in-progress: false

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'labeled' && github.event.label.name == 'claude-code') ||
      (github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get issue number and detect trigger type
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "issues" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            echo "trigger=issue" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "issue_comment" ]; then
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
            # Detect if this comment is on a PR (not a plain issue)
            if [ -n "${{ github.event.issue.pull_request.url }}" ]; then
              echo "trigger=pr_comment" >> "$GITHUB_OUTPUT"
              # Get PR branch name
              PR_BRANCH=$(gh pr view "${{ github.event.issue.number }}" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
              echo "pr_branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
            else
              echo "trigger=issue" >> "$GITHUB_OUTPUT"
            fi
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.issue_number }}" >> "$GITHUB_OUTPUT"
            echo "trigger=issue" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.event_name }}" = "pull_request_review_comment" ] || [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
            echo "trigger=pr_comment" >> "$GITHUB_OUTPUT"
            PR_BRANCH=$(gh pr view "${{ github.event.pull_request.number }}" --json headRefName --jq '.headRefName' 2>/dev/null || echo "")
            echo "pr_branch=$PR_BRANCH" >> "$GITHUB_OUTPUT"
          else
            echo "number=" >> "$GITHUB_OUTPUT"
            echo "trigger=unknown" >> "$GITHUB_OUTPUT"
          fi

      - name: Check main branch CI health
        if: (github.event_name == 'issues' && github.event.action == 'labeled') || github.event_name == 'workflow_dispatch'
        id: main_health
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          LAST_MAIN_CI=$(gh run list --workflow=ci-cd.yml --branch=main --limit 1 --json conclusion --jq '.[0].conclusion' 2>/dev/null || echo "unknown")
          if [ "$LAST_MAIN_CI" = "failure" ]; then
            echo "WARNING: Main branch CI is currently broken. Proceeding with caution."
            echo "healthy=false" >> "$GITHUB_OUTPUT"
          else
            echo "healthy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate story dependencies (DAG)
        if: >-
          ((github.event_name == 'issues' &&
          github.event.action == 'labeled' &&
          github.event.label.name == 'claude-code') ||
          github.event_name == 'workflow_dispatch') &&
          steps.issue.outputs.number != ''
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          DAG_FILE=".github/story-dag.json"

          if [ ! -f "$DAG_FILE" ]; then
            echo "No DAG file found. Proceeding (might be a non-DAG issue)."
            echo "valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Check if this issue is in the DAG
          STORY_EPIC=$(jq -r --argjson num "$ISSUE_NUM" '.stories[($num | tostring)].epic // empty' "$DAG_FILE")

          if [ -z "$STORY_EPIC" ]; then
            echo "Issue #$ISSUE_NUM is not in the story DAG. Proceeding as ad-hoc."
            echo "valid=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          STORY_ID=$(jq -r --argjson num "$ISSUE_NUM" '.stories[($num | tostring)].id' "$DAG_FILE")
          EPIC_NAME=$(jq -r --arg ep "$STORY_EPIC" '.epics[$ep].name' "$DAG_FILE")

          # Validation 1: Check previous story in same epic is complete
          EPIC_STORIES=$(jq -r --arg ep "$STORY_EPIC" '.epics[$ep].stories | @json' "$DAG_FILE")
          STORY_INDEX=$(echo "$EPIC_STORIES" | jq --argjson num "$ISSUE_NUM" 'to_entries[] | select(.value == $num) | .key')

          if [ "$STORY_INDEX" -gt 0 ]; then
            PREV_INDEX=$((STORY_INDEX - 1))
            PREV_ISSUE=$(echo "$EPIC_STORIES" | jq ".[$PREV_INDEX]")
            PREV_STATE=$(gh issue view "$PREV_ISSUE" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")

            if [ "$PREV_STATE" = "OPEN" ]; then
              echo "BLOCKED: Previous story in epic (#$PREV_ISSUE) is still open."
              echo "valid=false" >> "$GITHUB_OUTPUT"
              gh issue edit "$ISSUE_NUM" --remove-label "claude-code"
              gh issue comment "$ISSUE_NUM" --body "Blocked: Previous story in Epic $STORY_EPIC (#$PREV_ISSUE) is still open. This story will be triggered automatically when it completes."
              exit 0
            fi
          fi

          # Validation 2: Check all dependency epics are complete
          for DEP_EPIC in $(jq -r --arg ep "$STORY_EPIC" '.epics[$ep].depends_on[]' "$DAG_FILE"); do
            for DEP_ISSUE in $(jq -r --arg ep "$DEP_EPIC" '.epics[$ep].stories[]' "$DAG_FILE"); do
              DEP_STATE=$(gh issue view "$DEP_ISSUE" --json state --jq '.state' 2>/dev/null || echo "UNKNOWN")
              if [ "$DEP_STATE" = "OPEN" ]; then
                DEP_NAME=$(jq -r --arg ep "$DEP_EPIC" '.epics[$ep].name' "$DAG_FILE")
                echo "BLOCKED: Dependency Epic $DEP_EPIC ($DEP_NAME) has open story #$DEP_ISSUE."
                echo "valid=false" >> "$GITHUB_OUTPUT"
                gh issue edit "$ISSUE_NUM" --remove-label "claude-code"
                gh issue comment "$ISSUE_NUM" --body "Blocked: Dependency Epic $DEP_EPIC ($DEP_NAME) is not yet complete (story #$DEP_ISSUE still open). This story will be triggered when all dependencies are met."
                exit 0
              fi
            done
          done

          echo "DAG validation passed. Story $STORY_ID (Epic $STORY_EPIC: $EPIC_NAME) is ready."
          echo "valid=true" >> "$GITHUB_OUTPUT"

      - name: Abort if validation failed
        if: steps.validate.outputs.valid == 'false'
        run: |
          echo "Story chain validation failed. Aborting."
          exit 0

      # ── Claude for NEW ISSUES (full implementation) ──
      # Uses Opus for code generation — the only step that needs the best model
      - name: Run Claude Code (implement issue)
        if: steps.validate.outputs.valid != 'false' && steps.issue.outputs.trigger != 'pr_comment'
        id: claude-issue
        uses: anthropics/claude-code-action@v1
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          model: claude-opus-4-6
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          additional_permissions: |
            actions: read
          claude_args: "--allowedTools Bash Read Write Edit Glob Grep Agent WebFetch WebSearch NotebookEdit LSP mcp__context7__resolve-library-id mcp__context7__query-docs mcp__playwright__browser_navigate mcp__playwright__browser_screenshot mcp__playwright__browser_click mcp__playwright__browser_type mcp__fetch__fetch"
          show_full_output: true
          prompt: |
            You are an autonomous developer building the Ignite innovation management platform.
            Follow every step below precisely.

            ## CONTEXT: Project Architecture
            This is a T3 Stack application (Next.js 14+ App Router, tRPC, Prisma, Auth.js v5, Tailwind CSS, shadcn/ui).
            Key architectural rules:
            - TypeScript strict mode — no `any`, no `as any`, no `@ts-ignore`
            - tRPC routers are thin dispatch — validate input, check permissions, call service, return result
            - Services contain ALL business logic — no business logic in routers or components
            - Status changes ONLY through state machine transition functions — never direct prisma.update({ status })
            - Events via EventBus — services emit events, listeners handle cross-cutting concerns
            - RBAC via middleware — every tRPC procedure checks permissions
            - AI features are optional — platform must function fully without them
            - The logger uses pino. API is: `logger.info({data}, "message")` — object FIRST, message string SECOND
            - For string-only logs: `logger.info("message")` is fine

            Before you start coding, read these files for full context:
            - CLAUDE.md (coding standards and conventions)
            - _bmad-output/project-context.md (127 rules for AI agent consistency)
            - _bmad-output/planning-artifacts/architecture.md (full architecture decisions)

            ## STEP 0: Acknowledge & Update Kanban
            1. Post an acknowledgment comment on the issue:
               ```
               gh issue comment <issue-number> --body "I'm picking up this issue now. I'll create a feature branch, implement, run tests, and open a PR when ready.

               **Status:** In Progress
               **Branch:** \`claude/issue-<issue-number>-<slug>\`"
               ```
            2. Move the issue to "In progress" on the Kanban board:
               ```
               chmod +x .github/scripts/update-kanban.sh
               GH_TOKEN="$PROJECT_TOKEN" .github/scripts/update-kanban.sh --issue <issue-number> --status "In progress"
               ```
               If this fails, continue — it's non-blocking.

            ## STEP 1: Create a Feature Branch
            - Create a new branch from main: `claude/issue-<ISSUE_NUMBER>-<short-slug>`
            - The slug should be 2-4 words derived from the issue title (lowercase, hyphenated)
            - Example: `claude/issue-19-project-scaffold`

            ## STEP 2: Understand What Exists
            - Run `ls src/` to see the current project structure
            - Read `package.json` to understand installed dependencies
            - Read `prisma/schema.prisma` to understand the current data model
            - Do NOT recreate files that already exist — build ON TOP of what's there
            - If this is Story 1.1 (project scaffold), you ARE creating the initial structure

            ## STEP 3: Implement the Change
            - Read the issue description carefully for acceptance criteria
            - Follow the architecture document patterns exactly
            - Implement the requested feature
            - Write tests where applicable (Vitest for unit, Playwright for E2E)
            - Follow naming conventions: camelCase for functions/variables, PascalCase for components/types, snake_case for database columns

            ## STEP 4: Format & Validate
            - Auto-format ALL code before committing:
              ```
              npx prettier --write .
              npx eslint . --fix
              ```
            - Run validation checks: `npm run typecheck`, `npm run lint`, `npm run test`
            - Fix ALL errors before proceeding
            - If a check command doesn't exist yet (early stories), skip it
            - Commit your changes with a descriptive message:
              `feat(scope): description` or `fix(scope): description`

            ## STEP 5: Rebase on Latest Main & Create a Pull Request
            Before pushing, ALWAYS rebase on the latest main to prevent conflicts:
            ```
            git fetch origin main
            git rebase origin/main
            ```

            ### CRITICAL: Resolving rebase conflicts
            Multiple stories may run in parallel across different epics. You MUST handle
            conflicts correctly or the entire pipeline stalls.

            **General rule:** Never abort a rebase. Always resolve and continue.

            **For `package-lock.json`** (MOST COMMON conflict):
            ```
            git checkout --theirs package-lock.json
            npm install
            git add package-lock.json
            git rebase --continue
            ```

            **For `package.json`**:
            Accept BOTH sides. Keep all dependencies from both versions. If the same
            dependency has different versions, use the HIGHER version. Then run
            `npm install` to regenerate the lock file. `git add package.json package-lock.json`

            **For `prisma/schema.prisma`**:
            Accept BOTH sides (additive merge). Keep ALL models, enums, and relations
            from both versions. Never remove a model that main has. After resolving:
            ```
            npx prisma validate
            npx prisma format
            git add prisma/schema.prisma
            ```

            **For `src/server/trpc/routers/root.ts`** (router index):
            Accept BOTH sides. Keep all router imports and registrations from both versions.

            **For `src/app/(platform)/layout.tsx`** or navigation files:
            Accept BOTH sides. Keep all navigation items and layout elements from both.

            **For `src/server/events/event-bus.ts`** or shared service files:
            Accept BOTH sides. Keep all event types and handlers from both versions.

            **For files YOU created** that don't exist in main:
            Keep YOUR version: `git checkout --ours <file> && git add <file>`

            **For ANY other conflict**:
            Read both sides carefully. Keep ALL functionality from both. Never drop
            code that main has. After resolving: `git add <file> && git rebase --continue`

            **If rebase fails completely** (rare):
            ```
            git rebase --abort
            git merge origin/main --no-edit
            ```
            Then resolve merge conflicts using the same rules above.

            Then push and create the PR:
            - Push your branch: `git push --force-with-lease origin <branch>`
            - Create a PR using `gh pr create`
            - PR title: clear, concise description of the change
            - PR body MUST include:
              - `Closes #<issue-number>` — THIS IS CRITICAL for the story chain to advance
              - A summary of what was implemented
              - Files changed and their purpose
              - Any notable design decisions
              - Testing notes

            After creating the PR, enable auto-merge so it merges when CI passes:
            ```
            gh pr merge <PR_NUMBER> --squash --auto
            ```

            ## STEP 6: Update Kanban to In Review
            - After creating the PR, run:
              ```
              chmod +x .github/scripts/update-kanban.sh
              GH_TOKEN="$PROJECT_TOKEN" .github/scripts/update-kanban.sh --issue <issue-number> --status "In review"
              ```

            ## CRITICAL RULES
            - NEVER recreate project scaffolding if it already exists
            - NEVER modify CLAUDE.md, settings.json, or lock files unless explicitly told to
            - NEVER hardcode secrets or API URLs — use environment variables
            - NEVER commit .env files
            - Always follow CLAUDE.md guidelines
            - Always run available validation before committing
            - Write tests for new features when a test framework is configured
            - One logical change per commit
            - The PR body MUST contain `Closes #<issue-number>` for the chain to work

      # ── Output validation for issue implementation ──
      - name: Validate Claude output
        if: steps.claude-issue.outcome == 'success' && steps.issue.outputs.trigger != 'pr_comment'
        id: validate_output
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ISSUE_NUM="${{ steps.issue.outputs.number }}"

          # Check if a PR was created for this issue
          OPEN_PR=$(gh pr list --state open --search "issue-${ISSUE_NUM}" --json number --jq '.[0].number // empty' 2>/dev/null || echo "")

          # Check if a branch exists
          BRANCH_EXISTS=$(git branch -r --list "origin/claude/issue-${ISSUE_NUM}-*" 2>/dev/null | head -1 || echo "")

          if [ -n "$OPEN_PR" ]; then
            echo "Claude created PR #$OPEN_PR. Output validated."
            echo "has_output=true" >> "$GITHUB_OUTPUT"
          elif [ -n "$BRANCH_EXISTS" ]; then
            echo "Claude created branch but no PR. Partial output."
            echo "has_output=partial" >> "$GITHUB_OUTPUT"
          else
            echo "WARNING: Claude completed successfully but created no branch or PR."
            echo "has_output=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove label on silent failure
        if: steps.validate_output.outputs.has_output == 'false'
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          set +e
          ISSUE_NUM="${{ steps.issue.outputs.number }}"
          gh issue edit "$ISSUE_NUM" --remove-label "claude-code" 2>/dev/null || true
          gh issue comment "$ISSUE_NUM" --body "Claude Code completed but produced no branch or PR. Removing label so the watchdog can retry.

          **Status:** Silent failure (no output)
          **Run:** [${{ github.run_id }}](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" || true

      # ── Claude for PR COMMENTS (targeted fix/rebase only) ──
      # Uses Sonnet — cheaper model sufficient for targeted fixes
      - name: Run Claude Code (PR feedback)
        if: steps.issue.outputs.trigger == 'pr_comment'
        id: claude-pr
        uses: anthropics/claude-code-action@v1
        env:
          PROJECT_TOKEN: ${{ secrets.PROJECT_TOKEN }}
        with:
          model: claude-sonnet-4-6
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "claude[bot],github-actions[bot]"
          additional_permissions: |
            actions: read
          claude_args: "--allowedTools Bash Read Write Edit Glob Grep Agent"
          show_full_output: true
          prompt: |
            You are fixing feedback on an EXISTING pull request. Do NOT re-implement the feature.
            Do ONLY what the comment asks — nothing more.

            ## PR Details
            - PR number: ${{ steps.issue.outputs.number }}
            - Branch: ${{ steps.issue.outputs.pr_branch }}

            ## Your Task
            1. Read the latest comment on this PR to understand what's requested:
               `gh pr view ${{ steps.issue.outputs.number }} --json comments --jq '.comments | last | .body'`
            2. Checkout the PR branch:
               `git checkout ${{ steps.issue.outputs.pr_branch }}`
            3. Do EXACTLY what's asked. Common requests:
               - **Rebase**: `git fetch origin main && git rebase origin/main`
                 - For package-lock.json conflicts: `git checkout --theirs package-lock.json && npm install && git add package-lock.json && git rebase --continue`
                 - For prisma/schema.prisma conflicts: keep ALL models from both sides, then `npx prisma validate && npx prisma format && git add prisma/schema.prisma && git rebase --continue`
                 - For other conflicts: keep ALL code from both sides, `git add <file> && git rebase --continue`
               - **Fix code**: make the specific changes requested, nothing else
               - **Fix tests**: run `npm run typecheck && npm run lint && npm run test` and fix failures
            4. Push the changes: `git push --force-with-lease origin ${{ steps.issue.outputs.pr_branch }}`
            5. Post a SHORT comment on the PR summarizing what you did:
               `gh pr comment ${{ steps.issue.outputs.number }} --body "Done: <what you did>"`

            ## CRITICAL RULES
            - Do NOT create a new branch
            - Do NOT re-implement the feature
            - Do NOT read architecture docs or explore the codebase unless needed for the specific fix
            - Do ONLY what the comment asks — be fast and targeted
