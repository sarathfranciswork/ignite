{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ignite.fullname" . }}
  labels:
    {{- include "ignite.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if and .Values.postgresql.enabled (not .Values.secrets.DATABASE_URL) }}
  DATABASE_URL: {{ include "ignite.postgresql.url" . | quote }}
  {{- else }}
  DATABASE_URL: {{ .Values.secrets.DATABASE_URL | quote }}
  {{- end }}
  {{- if and .Values.redis.enabled (not .Values.secrets.REDIS_URL) }}
  REDIS_URL: {{ include "ignite.redis.url" . | quote }}
  {{- else }}
  REDIS_URL: {{ .Values.secrets.REDIS_URL | quote }}
  {{- end }}
  NEXTAUTH_SECRET: {{ .Values.secrets.NEXTAUTH_SECRET | quote }}
  NEXTAUTH_URL: {{ .Values.secrets.NEXTAUTH_URL | quote }}
  S3_ENDPOINT: {{ .Values.secrets.S3_ENDPOINT | quote }}
  S3_REGION: {{ .Values.secrets.S3_REGION | quote }}
  S3_BUCKET: {{ .Values.secrets.S3_BUCKET | quote }}
  S3_ACCESS_KEY_ID: {{ .Values.secrets.S3_ACCESS_KEY_ID | quote }}
  S3_SECRET_ACCESS_KEY: {{ .Values.secrets.S3_SECRET_ACCESS_KEY | quote }}
  SMTP_HOST: {{ .Values.secrets.SMTP_HOST | quote }}
  SMTP_PORT: {{ .Values.secrets.SMTP_PORT | quote }}
  SMTP_USER: {{ .Values.secrets.SMTP_USER | quote }}
  SMTP_PASS: {{ .Values.secrets.SMTP_PASS | quote }}
{{- end }}
