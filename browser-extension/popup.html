<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ignite Web Clipper</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 14px;
      color: #1a1a1a;
      padding: 16px;
      background: #fff;
    }
    h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    h1 .logo { width: 20px; height: 20px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #6b7280;
      margin-bottom: 4px;
      margin-top: 10px;
    }
    input, textarea, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus, textarea:focus, select:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.15);
    }
    textarea { resize: vertical; min-height: 60px; }
    select { cursor: pointer; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 10px;
      margin-top: 14px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn:hover { background: #4f46e5; }
    .btn:disabled { background: #a5b4fc; cursor: not-allowed; }
    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    .status.success { display: block; background: #ecfdf5; color: #065f46; border: 1px solid #a7f3d0; }
    .status.error { display: block; background: #fef2f2; color: #991b1b; border: 1px solid #fecaca; }
    .settings-link {
      display: block;
      margin-top: 12px;
      text-align: center;
      font-size: 12px;
      color: #6b7280;
      text-decoration: none;
    }
    .settings-link:hover { color: #6366f1; }
  </style>
</head>
<body>
  <h1>Ignite Web Clipper</h1>

  <label for="clip-title">Title</label>
  <input type="text" id="clip-title" placeholder="Page title" maxlength="200" />

  <label for="clip-excerpt">Excerpt</label>
  <textarea id="clip-excerpt" placeholder="Selected text or page excerpt" rows="3"></textarea>

  <label for="clip-type">Save as</label>
  <select id="clip-type">
    <option value="trend">Trend</option>
    <option value="insight">Insight</option>
    <option value="idea">Idea (Draft)</option>
  </select>

  <div id="campaign-group" style="display:none;">
    <label for="clip-campaign">Campaign ID</label>
    <input type="text" id="clip-campaign" placeholder="Campaign CUID (required for ideas)" />
  </div>

  <button class="btn" id="clip-btn">Clip to Ignite</button>

  <div id="status" class="status"></div>

  <a href="options.html" target="_blank" class="settings-link">Settings</a>

  <script src="popup.js"></script>
</body>
</html>
