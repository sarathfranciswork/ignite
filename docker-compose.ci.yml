version: "3.9"

# CI-specific Docker Compose - uses pre-built image, no volume mounts
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://ignite:ignite@postgres:5432/ignite?schema=public
      - REDIS_URL=redis://redis:6379
      - NEXTAUTH_SECRET=ci-test-secret-not-for-production-use
      - NEXTAUTH_URL=http://localhost:3000
      - S3_ENDPOINT=http://minio:9000
      - S3_REGION=us-east-1
      - S3_BUCKET=ignite-files
      - S3_ACCESS_KEY_ID=minioadmin
      - S3_SECRET_ACCESS_KEY=minioadmin
      - AI_ENABLED=false
      - AUTH_TRUST_HOST=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: "no"

  postgres:
    image: pgvector/pgvector:pg15
    environment:
      - POSTGRES_USER=ignite
      - POSTGRES_PASSWORD=ignite
      - POSTGRES_DB=ignite
    ports:
      - "5432:5432"
    tmpfs:
      - /var/lib/postgresql/data # RAM disk for speed in CI
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ignite"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
    tmpfs:
      - /data
